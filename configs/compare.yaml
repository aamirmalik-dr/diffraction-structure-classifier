# One held-out test set at moderate conditions: full confusion matrices,
# per-class scores, 95% confidence intervals, paired McNemar tests between every
# method pair, and the classical fair-tuning check (tuned vs default RF, plus a
# tuned RBF-SVM as a second classical estimator on the same features).
#
# n_per_class is 300 (1800 patterns) because the headline comparison is decided
# here and test patterns are simulated, hence free. At n=360 the
# pattern-vs-radial difference does not reach significance (p = 0.053), which
# would leave this repository's own headline claim unresolved.
mode: compare
n_per_class: 300
seed: 200
test_overrides: {dose: 40.0, orientation_spread: 3.0, keep_fraction: 0.85}
classical_default_check: true
tune_pool: 1500
tune_seed: 7
methods:
  - {name: classical_rf, kind: classical, path: models/classical_rf.joblib}
  - {name: radial_cnn,   kind: radial,    path: models/radial_cnn.pt}
  - {name: pattern_cnn,  kind: pattern,   path: models/pattern_cnn.pt}
